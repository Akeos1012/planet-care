<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlanetCare — Teacher Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
  [v-cloak]{display:none}
  body{font-family:'Segoe UI',sans-serif}
  .pulse-dot{animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:#2ecc71;border-radius:4px}
  .fade-enter-active,.fade-leave-active{transition:opacity .2s}
  .fade-enter-from,.fade-leave-to{opacity:0}
</style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

<div id="app" v-cloak>
  <!-- AUTH SCREEN -->
  <div v-if="screen==='auth'">
    <!-- Auth template is now modular -->
    <div class="min-h-screen flex items-center justify-center p-4">
      <div class="w-full max-w-md">
        <div class="text-center mb-8">
          <div class="text-6xl mb-3">🌍</div>
          <h1 class="text-4xl font-bold text-green-400">PlanetCare</h1>
          <p class="text-green-200/50 text-sm mt-1">Teacher Management Panel</p>
        </div>
        <div class="bg-green-950/50 border border-green-800/30 rounded-2xl p-8">
          <div class="flex mb-6 bg-black/30 rounded-xl p-1">
            <button @click="authTab='login'" :class="authTab==='login'?'bg-green-600 text-white':'text-green-300/50 hover:text-green-300'" class="flex-1 py-2 rounded-lg text-sm font-bold transition-all">Login</button>
            <button @click="authTab='register'" :class="authTab==='register'?'bg-green-600 text-white':'text-green-300/50 hover:text-green-300'" class="flex-1 py-2 rounded-lg text-sm font-bold transition-all">Register</button>
          </div>
          <!-- Login Tab -->
          <div v-if="authTab==='login'">
            <div class="mb-4">
              <label class="text-xs text-green-300/50 font-bold uppercase tracking-wider mb-1 block">Email</label>
              <input v-model="loginEmail" type="email" placeholder="teacher@ama.edu.ph" class="w-full bg-black/40 border border-green-800/30 rounded-xl px-4 py-3 text-white placeholder-green-300/20 focus:outline-none focus:border-green-500 text-sm"/>
            </div>
            <div class="mb-6">
              <label class="text-xs text-green-300/50 font-bold uppercase tracking-wider mb-1 block">Password</label>
              <input v-model="loginPassword" type="password" placeholder="••••••••" @keyup.enter="login" class="w-full bg-black/40 border border-green-800/30 rounded-xl px-4 py-3 text-white placeholder-green-300/20 focus:outline-none focus:border-green-500 text-sm"/>
            </div>
            <button @click="login" :disabled="loading" class="w-full bg-green-500 hover:bg-green-400 disabled:opacity-50 text-white font-bold py-3 rounded-xl transition-all text-sm">
              {{loading?'Logging in...':'Login →'}}
            </button>
          </div>
          <!-- Register Tab -->
          <div v-if="authTab==='register'">
            <div class="mb-3">
              <label class="text-xs text-green-300/50 font-bold uppercase tracking-wider mb-1 block">Full Name</label>
              <input v-model="regName" type="text" placeholder="e.g. Ms. Santos" class="w-full bg-black/40 border border-green-800/30 rounded-xl px-4 py-3 text-white placeholder-green-300/20 focus:outline-none focus:border-green-500 text-sm"/>
            </div>
            <div class="mb-3">
              <label class="text-xs text-green-300/50 font-bold uppercase tracking-wider mb-1 block">Email</label>
              <input v-model="regEmail" type="email" placeholder="teacher@ama.edu.ph" class="w-full bg-black/40 border border-green-800/30 rounded-xl px-4 py-3 text-white placeholder-green-300/20 focus:outline-none focus:border-green-500 text-sm"/>
            </div>
            <div class="mb-3">
              <label class="text-xs text-green-300/50 font-bold uppercase tracking-wider mb-1 block">Subject / Grade</label>
              <input v-model="regSubject" type="text" placeholder="e.g. Science - Grade 5" class="w-full bg-black/40 border border-green-800/30 rounded-xl px-4 py-3 text-white placeholder-green-300/20 focus:outline-none focus:border-green-500 text-sm"/>
            </div>
            <div class="mb-6">
              <label class="text-xs text-green-300/50 font-bold uppercase tracking-wider mb-1 block">Password</label>
              <input v-model="regPassword" type="password" placeholder="Min. 6 characters" class="w-full bg-black/40 border border-green-800/30 rounded-xl px-4 py-3 text-white placeholder-green-300/20 focus:outline-none focus:border-green-500 text-sm"/>
            </div>
            <button @click="register" :disabled="loading" class="w-full bg-green-500 hover:bg-green-400 disabled:opacity-50 text-white font-bold py-3 rounded-xl transition-all text-sm">
              {{loading?'Creating account...':'Create Account →'}}
            </button>
          </div>
          <div v-if="authError" class="mt-4 bg-red-500/10 border border-red-500/30 rounded-xl px-4 py-3 text-red-400 text-sm text-center">{{authError}}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD SCREEN -->
  <div v-if="screen==='dashboard'">
    <!-- Topbar -->
    <nav class="bg-green-950/80 border-b border-green-800/20 px-6 py-3 flex items-center justify-between sticky top-0 z-50 backdrop-blur">
      <div class="flex items-center gap-3">
        <span class="text-2xl">🌍</span>
        <span class="font-bold text-green-400 text-lg">PlanetCare</span>
        <span class="bg-green-500/20 border border-green-500/30 text-green-300 text-xs px-2 py-0.5 rounded-full font-bold">Teacher Panel</span>
      </div>
      <div class="flex items-center gap-3">
        <div class="text-right hidden sm:block">
          <div class="text-sm font-bold">{{teacher.name}}</div>
          <div class="text-xs text-green-300/40">{{teacher.subject}}</div>
        </div>
        <button @click="logout" class="bg-red-500/10 border border-red-500/20 hover:bg-red-500/20 text-red-400 text-xs font-bold px-3 py-1.5 rounded-lg transition-all">Logout</button>
      </div>
    </nav>

    <div class="flex min-h-screen">
      <!-- Sidebar -->
      <aside class="w-14 md:w-52 bg-green-950/40 border-r border-green-800/20 flex flex-col py-4 gap-1 shrink-0">
        <button v-for="tab in tabs" :key="tab.id" @click="activeTab=tab.id"
          :class="activeTab===tab.id?'bg-green-600/20 border-r-2 border-green-400 text-green-300':'text-green-300/40 hover:text-green-300 hover:bg-green-800/10'"
          class="flex items-center gap-3 px-4 py-3 transition-all text-left w-full">
          <span class="text-xl shrink-0">{{tab.icon}}</span>
          <span class="hidden md:block text-sm font-bold">{{tab.label}}</span>
        </button>
      </aside>

      <!-- Content Area - Components loaded below -->
      <main class="flex-1 p-4 md:p-6 overflow-auto">
        <!-- Each section is now imported as a separate module -->
        <!-- Overview, Classes, Events, Templates, History, Reports, Settings -->
        
        <!-- ========== OVERVIEW ========== -->
        <div v-if="activeTab==='overview'">
          <div v-include="'./components/overview.html'"></div>
        </div>

        <!-- ========== CLASSES ========== -->
        <div v-if="activeTab==='classes'">
          <div v-include="'./components/classes.html'"></div>
        </div>

        <!-- ========== EVENTS ========== -->
        <div v-if="activeTab==='events'">
          <div v-include="'./components/events.html'"></div>
        </div>

        <!-- ========== TEMPLATES ========== -->
        <div v-if="activeTab==='templates'">
          <div v-include="'./components/templates.html'"></div>
        </div>

        <!-- ========== HISTORY ========== -->
        <div v-if="activeTab==='history'">
          <div v-include="'./components/history.html'"></div>
        </div>

        <!-- ========== REPORTS ========== -->
        <div v-if="activeTab==='reports'">
          <div v-include="'./components/reports.html'"></div>
        </div>

        <!-- ========== SETTINGS ========== -->
        <div v-if="activeTab==='settings'">
          <div v-include="'./components/settings.html'"></div>
        </div>
      </main>
    </div>
  </div>
</div>

<!-- Initialize App -->
<script type="module">
import { createMainApp } from './js/app.js';

const app = createMainApp();
app.mount('#app');
</script>

</body>
</html>
