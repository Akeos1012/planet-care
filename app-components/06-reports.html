<!-- Reports Tab -->
<h2 class="text-xl font-bold mb-6">Student Reports</h2>

<select v-model="reportClass" @change="loadReport" class="bg-black/40 border border-green-800/30 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-green-500 mb-4 w-full max-w-xs">
  <option value="">Select a class</option>
  <option v-for="c in classes" :key="c.id" :value="c.id">{{c.name}} - {{c.section}}</option>
</select>

<div v-if="reportStudents.length>0" class="bg-green-950/40 border border-green-800/20 rounded-2xl overflow-hidden">
  <table class="w-full text-sm">
    <thead>
      <tr class="border-b border-green-800/20">
        <th class="text-left px-5 py-3 text-xs text-green-300/40 font-bold uppercase tracking-wider">Student</th>
        <th class="text-center px-4 py-3 text-xs text-green-300/40 font-bold uppercase tracking-wider">Total</th>
        <th class="text-center px-4 py-3 text-xs text-green-300/40 font-bold uppercase tracking-wider">Sessions</th>
        <th class="text-center px-4 py-3 text-xs text-green-300/40 font-bold uppercase tracking-wider">Avg</th>
        <th class="text-center px-4 py-3 text-xs text-green-300/40 font-bold uppercase tracking-wider">Performance</th>
      </tr>
    </thead>
    <tbody>
      <tr v-for="s in reportStudents" :key="s.id" class="border-b border-green-800/10 hover:bg-green-800/5 transition-all">
        <td class="px-5 py-3">
          <div class="flex items-center gap-2">
            <div class="w-7 h-7 rounded-full bg-green-500 flex items-center justify-center text-xs font-bold text-green-950">{{s.name[0].toUpperCase()}}</div>
            <span class="font-medium">{{s.name}}</span>
          </div>
        </td>
        <td class="text-center px-4 py-3 font-bold text-green-400">{{s.totalScore||0}}</td>
        <td class="text-center px-4 py-3 text-green-300/50">{{s.sessionCount||0}}</td>
        <td class="text-center px-4 py-3">{{s.avgScore||0}}</td>
        <td class="text-center px-4 py-3">
          <span :class="perfColor(s.avgScore)" class="text-xs font-bold px-2 py-1 rounded-full">{{perfLabel(s.avgScore)}}</span>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<div v-else-if="reportClass" class="text-center py-16 text-green-300/30">
  <div class="text-5xl mb-3">📊</div>
  <p class="text-sm">No data yet for this class.</p>
</div>
