<!-- Templates Tab -->
<div class="flex items-center justify-between mb-6">
  <h2 class="text-xl font-bold">Question Templates</h2>
  <button @click="showAddTemplate=true" class="bg-green-500 hover:bg-green-400 text-white font-bold px-4 py-2 rounded-xl text-sm transition-all">+ Create Template</button>
</div>

<!-- Modal: Create Template -->
<div v-if="showAddTemplate" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 overflow-auto" @click.self="showAddTemplate=false">
  <div class="bg-gray-900 border border-green-800/30 rounded-2xl p-6 w-full max-w-lg max-h-screen overflow-y-auto">
    <h3 class="font-bold text-green-400 mb-4">Create Template</h3>
    <div class="mb-3">
      <label class="text-xs text-green-300/50 font-bold uppercase tracking-wider mb-1 block">Template Name</label>
      <input v-model="newTemplate.name" placeholder="e.g. Waste Management 101" class="w-full bg-black/40 border border-green-800/30 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-green-500"/>
    </div>
    <div class="mb-3">
      <label class="text-xs text-green-300/50 font-bold uppercase tracking-wider mb-1 block">Description</label>
      <textarea v-model="newTemplate.description" placeholder="What is this template about?" class="w-full bg-black/40 border border-green-800/30 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-green-500 h-16 resize-none"></textarea>
    </div>
    <div class="mb-4">
      <div class="flex items-center gap-3">
        <input type="checkbox" v-model="newTemplate.isPublic" class="accent-green-500 w-4 h-4"/>
        <label class="text-sm text-green-300/60">Make this template public</label>
      </div>
    </div>
    <div v-if="newTemplate.isPublic" class="mb-4">
      <label class="text-xs text-green-300/50 font-bold uppercase tracking-wider mb-1 block">Access Code (optional)</label>
      <input v-model="newTemplate.accessCode" placeholder="Leave empty for unrestricted access" class="w-full bg-black/40 border border-green-800/30 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-green-500"/>
    </div>
    <div class="mb-4">
      <div class="text-sm font-bold text-green-300 mb-2">Events in this template: {{newTemplate.events.length}}</div>
      <div class="bg-black/20 rounded-xl p-3 max-h-40 overflow-y-auto space-y-2">
        <div v-if="newTemplate.events.length===0" class="text-center text-green-300/30 text-xs py-4">No events added yet. Add events from the Events tab.</div>
        <div v-for="(e,i) in newTemplate.events" :key="i" class="flex items-center gap-2 bg-green-900/20 rounded-lg px-3 py-2 text-xs">
          <span class="flex-1 truncate">{{e.question}}</span>
          <button @click="removeEventFromTemplate(i)" class="text-red-400/50 hover:text-red-400 text-sm">✕</button>
        </div>
      </div>
    </div>
    <div class="flex gap-3">
      <button @click="showAddTemplate=false" class="flex-1 border border-green-800/30 text-green-300/50 py-2.5 rounded-xl text-sm font-bold hover:bg-green-800/10 transition-all">Cancel</button>
      <button @click="addTemplate" class="flex-1 bg-green-500 hover:bg-green-400 text-white py-2.5 rounded-xl text-sm font-bold transition-all">Create</button>
    </div>
  </div>
</div>

<!-- Empty State -->
<div v-if="templates.length===0" class="text-center py-16 text-green-300/30">
  <div class="text-5xl mb-3">📦</div>
  <p class="text-sm">No templates yet. Create your first one!</p>
</div>

<!-- Templates Grid -->
<div class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
  <div v-for="t in templates" :key="t.id" class="bg-green-950/40 border border-green-800/20 rounded-2xl p-5 hover:border-green-600/40 cursor-pointer transition-all">
    <div class="flex items-start justify-between mb-3">
      <div class="flex-1">
        <div class="font-bold">{{t.name}}</div>
        <div class="text-xs text-green-300/40 mt-1">{{t.description}}</div>
      </div>
      <button @click="deleteTemplate(t.id)" class="text-red-400/30 hover:text-red-400 text-xs transition-all">✕</button>
    </div>
    <div class="flex items-center gap-2 text-xs text-green-300/30">
      <span>{{t.eventCount||0}} events</span>
      <span v-if="t.isPublic" class="bg-blue-500/20 text-blue-300 px-2 py-0.5 rounded-full font-bold">🌐 Public</span>
      <span v-else class="bg-green-500/20 text-green-300 px-2 py-0.5 rounded-full font-bold">🔒 Private</span>
    </div>
  </div>
</div>
