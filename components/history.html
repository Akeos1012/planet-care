<!-- HISTORY -->
<div v-if="activeTab==='history'">
  <h2 class="text-xl font-bold mb-6">Session History</h2>
  <div v-if="sessions.length===0" class="text-center py-16 text-green-300/30">
    <div class="text-5xl mb-3">🕐</div><p class="text-sm">No sessions yet.</p>
  </div>
  <div class="space-y-3">
    <div v-for="s in sessions" :key="s.id" class="bg-green-950/40 border border-green-800/20 rounded-2xl p-5">
      <div class="flex items-center justify-between mb-3">
        <div>
          <div class="font-bold flex items-center gap-2">PIN: <span class="text-green-400 font-mono text-xl">{{s.pin}}</span>
            <span :class="s.status==='ended'?'bg-gray-500/20 text-gray-400':'bg-green-500/20 text-green-400'" class="text-xs px-2 py-0.5 rounded-full font-bold">{{s.status}}</span>
          </div>
          <div class="text-xs text-green-300/30 mt-1">{{formatDate(s.createdAt)}}</div>
        </div>
        <div class="text-right"><div class="text-lg font-bold">{{s.studentCount||0}}</div><div class="text-xs text-green-300/30">students</div></div>
      </div>
      <div v-if="s.topStudents&&s.topStudents.length>0" class="flex flex-wrap gap-2">
        <div v-for="(st,i) in s.topStudents.slice(0,3)" :key="i" class="flex items-center gap-1.5 bg-black/20 rounded-lg px-2.5 py-1.5">
          <span class="text-xs">{{i===0?'🥇':i===1?'🥈':'🥉'}}</span>
          <span class="text-xs font-bold">{{st.name}}</span>
          <span class="text-xs text-green-400 font-bold">{{st.score}}pts</span>
        </div>
      </div>
    </div>
  </div>
</div>
