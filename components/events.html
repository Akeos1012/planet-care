<!-- EVENTS -->
<div v-if="activeTab==='events'">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-xl font-bold">Game Events</h2>
    <button @click="showAddEvent=true" class="bg-green-500 hover:bg-green-400 text-white font-bold px-4 py-2 rounded-xl text-sm transition-all">+ Add Event</button>
  </div>
  <!-- Add Event Modal -->
  <div v-if="showAddEvent" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" @click.self="showAddEvent=false">
    <div class="bg-gray-900 border border-green-800/30 rounded-2xl p-6 w-full max-w-lg max-h-screen overflow-y-auto">
      <h3 class="font-bold text-green-400 mb-4">Add New Event</h3>
      <div class="mb-3"><label class="text-xs text-green-300/50 font-bold uppercase tracking-wider mb-1 block">Scenario / Question</label>
        <textarea v-model="newEvent.question" placeholder="e.g. You see trash on the street. What will you do?" class="w-full bg-black/40 border border-green-800/30 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-green-500 h-20 resize-none"></textarea></div>
      <div class="mb-3"><label class="text-xs text-green-300/50 font-bold uppercase tracking-wider mb-1 block">Category</label>
        <select v-model="newEvent.category" class="w-full bg-black/40 border border-green-800/30 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-green-500">
          <option value="waste">🗑️ Waste Management</option>
          <option value="water">💧 Water Conservation</option>
          <option value="energy">⚡ Energy Saving</option>
          <option value="climate">🌡️ Climate Change</option>
          <option value="forest">🌲 Forest Protection</option>
        </select></div>
      <div class="mb-4"><label class="text-xs text-green-300/50 font-bold uppercase tracking-wider mb-2 block">4 Choices</label>
        <div v-for="(choice,i) in newEvent.choices" :key="i" class="flex gap-2 mb-2 items-center">
          <span class="text-xs text-green-300/40 w-5 font-bold shrink-0">{{['A','B','C','D'][i]}}</span>
          <input v-model="newEvent.choices[i].text" :placeholder="'Choice '+(i+1)" class="flex-1 bg-black/40 border border-green-800/30 rounded-lg px-3 py-2 text-white text-xs focus:outline-none focus:border-green-500"/>
          <select v-model="newEvent.choices[i].effect" class="bg-black/40 border border-green-800/30 rounded-lg px-2 py-2 text-white text-xs focus:outline-none shrink-0">
            <option value="good">+Good</option><option value="bad">-Bad</option><option value="neutral">Neutral</option>
          </select>
        </div>
      </div>
      <div class="mb-5 flex items-center gap-3">
        <input type="checkbox" v-model="newEvent.hasMiniGame" class="accent-green-500 w-4 h-4"/>
        <label class="text-sm text-green-300/60">Has Mini-game?</label>
      </div>
      <div class="flex gap-3">
        <button @click="showAddEvent=false" class="flex-1 border border-green-800/30 text-green-300/50 py-2.5 rounded-xl text-sm font-bold hover:bg-green-800/10 transition-all">Cancel</button>
        <button @click="addEvent" class="flex-1 bg-green-500 hover:bg-green-400 text-white py-2.5 rounded-xl text-sm font-bold transition-all">Add Event</button>
      </div>
    </div>
  </div>
  <div v-if="events.length===0" class="text-center py-16 text-green-300/30">
    <div class="text-5xl mb-3">📋</div><p class="text-sm">No events yet.</p>
  </div>
  <div class="space-y-3">
    <div v-for="e in events" :key="e.id" class="bg-green-950/40 border border-green-800/20 rounded-2xl p-5">
      <div class="flex items-start justify-between mb-2">
        <div class="flex gap-2 flex-wrap">
          <span class="text-xs bg-green-500/20 text-green-300 px-2 py-0.5 rounded-full font-bold">{{categoryEmoji(e.category)}} {{e.category}}</span>
          <span v-if="e.hasMiniGame" class="text-xs bg-yellow-500/20 text-yellow-300 px-2 py-0.5 rounded-full font-bold">🎮 Mini-game</span>
        </div>
        <button @click="deleteEvent(e.id)" class="text-red-400/30 hover:text-red-400 text-xs ml-2 transition-all">✕</button>
      </div>
      <p class="text-sm mb-3 font-medium">{{e.question}}</p>
      <div class="grid grid-cols-2 gap-2">
        <div v-for="(c,i) in e.choices" :key="i" :class="c.effect==='good'?'border-green-500/30 bg-green-900/20':c.effect==='bad'?'border-red-500/30 bg-red-900/10':'border-gray-700/30'" class="border rounded-lg px-3 py-2 text-xs">
          <span class="font-bold text-green-300/50">{{['A','B','C','D'][i]}}.</span>
          <span class="ml-1">{{c.text||'(empty)'}}</span>
          <span :class="c.effect==='good'?'text-green-400':c.effect==='bad'?'text-red-400':'text-gray-400'" class="ml-1 font-bold">({{c.effect}})</span>
        </div>
      </div>
    </div>
  </div>
</div>
